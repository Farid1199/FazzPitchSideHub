{% extends 'base.html' %}

{% block title %}Password Reset Sent - FazzPitchSideHub{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-lg shadow-xl p-8 text-center">
            <div class="flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4 mx-auto">
                <i class="fas fa-envelope text-3xl text-green-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-4">Check Your Email</h1>
            <p class="text-gray-600 mb-6">
                If an account exists with that email address, we've sent a password reset link.
                Please check your inbox (and spam folder).
            </p>
            <a href="{% url 'login' %}" class="text-green-600 hover:text-green-700 font-medium">
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
