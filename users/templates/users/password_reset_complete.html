{% extends 'base.html' %}

{% block title %}Password Reset Complete - FazzPitchSideHub{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-lg shadow-xl p-8 text-center">
            <div class="flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4 mx-auto">
                <i class="fas fa-check text-3xl text-green-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-4">Password Reset Complete</h1>
            <p class="text-gray-600 mb-6">Your password has been set successfully. You can now log in with your new password.</p>
            <a href="{% url 'login' %}"
                class="inline-block px-6 py-3 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition">
                Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
