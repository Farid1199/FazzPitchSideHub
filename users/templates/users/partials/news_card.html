<!-- News Card for Club NewsItem Posts -->
<div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow">
    
    <!-- News Header -->
    <div class="p-6 pb-4 bg-gradient-to-r from-blue-50 to-green-50">
        <div class="flex items-start justify-between">
            <div class="flex items-center space-x-3">
                {% if news.club.logo_url %}
                    <img src="{{ news.club.logo_url }}" alt="{{ news.get_club_name }} logo" class="w-12 h-12 rounded-lg object-cover">
                {% else %}
                    <div class="w-12 h-12 bg-blue-500 rounded-lg flex items-center justify-center">
                        <i class="fas fa-shield-alt text-white text-xl"></i>
                    </div>
                {% endif %}
                <div>
                    <h3 class="font-bold text-gray-900">{{ news.get_club_name }}</h3>
                    <p class="text-sm text-gray-500">
                        Club • {{ news.get_league_display }}
                    </p>
                    <p class="text-xs text-gray-400">{{ news.published_date|timesince }} ago</p>
                </div>
            </div>
            <span class="px-3 py-1 bg-blue-100 text-blue-800 text-xs font-semibold rounded-full">
                <i class="fas fa-newspaper mr-1"></i>Club News
            </span>
        </div>
    </div>

    <!-- News Content -->
    <div class="p-6">
        <h4 class="text-xl font-bold text-gray-900 mb-3 hover:text-blue-600">
            <a href="{% url 'news_detail' news.pk %}">{{ news.title }}</a>
        </h4>
        <p class="text-gray-700 mb-4">{{ news.description|truncatewords:40 }}</p>
        
        <div class="flex items-center justify-between">
            <div class="flex items-center text-sm text-gray-500">
                <i class="fas fa-calendar-alt text-blue-500 mr-2"></i>
                <span>{{ news.published_date|date:"M d, Y" }}</span>
            </div>
            <a href="{% url 'news_detail' news.pk %}" 
               class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm font-semibold transition-colors">
                Read More <i class="fas fa-arrow-right ml-1"></i>
            </a>
        </div>
    </div>

</div>
